apiVersion: v1
kind: Service
metadata:
  name: {{ include "clusterMonitor.fullname" . }}-application
  labels:
    {{- include "clusterMonitor.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "clusterMonitor.selectorLabels" . | nindent 4 }}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "clusterMonitor.fullname" . }}
  labels:
    {{- include "clusterMonitor.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: cluster-monitor
  ports:
    - port: {{ .Values.service.port }}
      name: http

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "clusterMonitor.fullname" . }}-0
  labels:
    cluster-monitor-application: "true"
    {{- include "clusterMonitor.labels" . | nindent 4 }}
  {{- if and (gt (int .Values.replicaCount ) 1)  (eq (len .Values.cluster.ip) 0 )}}
  annotations:
    cm-enabled: "true"
    cm-forcePodMonitor: cm-cluster-monitor-1.cm-cluster-monitor
    cm-paths: |-
      /api/v1/application/monitor
  {{- end }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.service.port }}
      nodePort: 32473
      targetPort: http
      protocol: TCP
      name: http
  selector:
    "statefulset.kubernetes.io/pod-name": "cm-cluster-monitor-0"
    {{- include "clusterMonitor.selectorLabels" . | nindent 4 }}

---

{{- if gt (int .Values.replicaCount ) 1 }}
{{- $root := . }} # Save root context
{{- range $i := until (.Values.replicaCount | int) }}
  {{- if ne $i 0 }}  # Skip cm-cluster-monitor-0
apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-%d" (include "clusterMonitor.fullname" $root) $i }}
  labels:
    cluster-monitor-application: "true"
    {{- include "clusterMonitor.labels" $root | nindent 4 }}
  annotations:
    cm-enabled: "true"
    cm-forcePodMonitor: cm-cluster-monitor-0.cm-cluster-monitor
    cm-paths: |-
      /api/v1/application/monitor
spec:
  type: NodePort
  ports:
    - port: {{ $root.Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    "statefulset.kubernetes.io/pod-name": "cm-cluster-monitor-{{ $i }}"
    {{- include "clusterMonitor.selectorLabels" $root | nindent 4 }}
---
  {{- end }}
{{- end}}
{{- end}}

